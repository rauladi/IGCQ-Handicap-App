/* ── Handicap engine (exactly matches Yudi tab formulas) ──────── */
function scoreDiff(gross, cr, sr) {
  return ((gross - cr) * 113) / sr;
}

function calcHandicap(diffs) {
  const n = diffs.length;
  if (n === 0) return null;
  let v;
  if (n <= 3) {
    v = diffs.reduce((a,b) => a+b, 0) / n;
  } else if (n <= 7) {
    v = diffs.slice(-3).reduce((a,b) => a+b, 0) / 3;
  } else if (n <= 9) {
    const s = [...diffs.slice(-8)].sort((a,b) => a-b);
    v = (s[0]+s[1]+s[2]) / 3;
  } else {
    const s = [...diffs.slice(-10)].sort((a,b) => a-b);
    v = (s[0]+s[1]+s[2]) / 3;
  }
  return Math.min(36, v);
}

function grade(h) {
  if (h <= 18) return 'A';
  if (h <= 30) return 'B';
  return 'C';
}

function mid(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/_+$/,'');
}

function fmtDate(iso) {
  if (!iso) return '—';
  const [y,m,d] = iso.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

function today() {
  return new Date().toISOString().split('T')[0];
}

/* ── Seed Firestore on first run ───────────────────────────────── */
async function seedIfEmpty() {
  const snap = await db.collection('members').limit(1).get();
  if (!snap.empty) return;

  const batch = db.batch();
  MEMBER_NAMES.forEach(name => {
    const ref = db.collection('members').doc(mid(name));
    let rounds = [];
    if (name === 'Yudi Suharto') {
      rounds = YUDI_ROUNDS_RAW.map(([g,cr,sr,course,date]) => ({
        grossScore: g, courseRating: cr, slopeRating: sr, course, date,
        scoreDiff: scoreDiff(g, cr, sr),
        addedAt: date + 'T00:00:00.000Z'
      }));
    }
    batch.set(ref, { name, rounds, createdAt: new Date().toISOString() });
  });
  await batch.commit();
}

  if (filterG !== 'all') list = list.filter(r => r.hc !== null && grade(r.hc) === filterG);
  list.sort((a,b) => {
    if (sortBy === 'handicap') return (a.hc ?? 999) - (b.hc ?? 999);
    return a.name.localeCompare(b.name);
  });

  if (busy) return <div className="loading"><div className="loading-spin"/><div className="loading-txt">Loading leaderboard…</div></div>;

  return (
    <div>
      <div className="filter-bar">
        <input className="search-inp" placeholder="🔍  Search member…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <div className="filter-row">
          <select className="filter-sel" value={filterG} onChange={e=>setFilterG(e.target.value)}>
            <option value="all">All grades</option>
            <option value="A">Grade A · 1–18</option>
            <option value="B">Grade B · 19–30</option>
            <option value="C">Grade C · 31–36</option>
          </select>
          <select className="filter-sel" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
            <option value="handicap">↕ Handicap</option>
            <option value="name">↕ Name A–Z</option>
          </select>
        </div>
      </div>

      <div className="legend">
        <span className="legend-item"><span className="grade g-a">A</span> 1–18</span>
        <span className="legend-item"><span className="grade g-b">B</span> 19–30</span>
        <span className="legend-item"><span className="grade g-c">C</span> 31–36</span>
      </div>

      <div className="sec-hdr">
        <span className="sec-title">Members</span>
        <span className="sec-count">{list.length} of {rows.length}</span>
      </div>

      {list.map((r, i) => (
        <div key={r.id} className="p-row" onClick={() => onPlayer(r.id, r.name)}>
          <span className="p-rank">{i+1}</span>
          <div className="p-info">
            <div className="p-name">{r.name}</div>
            <div className="p-meta">{r.rounds} round{r.rounds!==1?'s':''} played</div>
          </div>
          {r.hc !== null
            ? <>
                <div className="p-hc">
                  <div className="p-hc-val">{r.hc.toFixed(2)}</div>
                  <div className="p-hc-lbl">HCI</div>
                </div>
                <GradeBadge h={r.hc}/>
              </>
            : <span style={{fontSize:12,color:'#bbb'}}>No rounds</span>
          }
          <span className="p-caret">›</span>
        </div>
      ))}
    </div>
  );
}

/* ─────────────────── PLAYER PROFILE ───────────────────────────── */
function Profile({ pid, pname, onBack, onAddScore }) {
  const [data, setData] = useState(null);
  const [busy, setBusy] = useState(true);

  useEffect(() => {
    const unsub = db.collection('members').doc(pid).onSnapshot(doc => {
      if (doc.exists) {
        const d = doc.data();
        const rounds = d.rounds || [];
        const diffs = rounds.map(r => r.scoreDiff);
        const hc = calcHandicap(diffs);
        setData({ name: d.name, rounds, hc });
      }
      setBusy(false);
    });
    return unsub;
  }, [pid]);

  if (busy) return <div className="loading"><div className="loading-spin"/><div className="loading-txt">Loading profile…</div></div>;
  if (!data) return <div className="loading"><div className="empty-txt">Member not found.</div></div>;

  const { name, rounds, hc } = data;
  const g = hc !== null ? grade(hc) : '—';

  const roundsWithHC = rounds.map((r, i) => {
    const diffs = rounds.slice(0, i+1).map(x => x.scoreDiff);
    return { ...r, hci: calcHandicap(diffs) };
  });

  const best = rounds.length ? Math.min(...rounds.map(r=>r.scoreDiff)).toFixed(2) : '—';
  const avg  = rounds.length ? (rounds.reduce((a,r)=>a+r.scoreDiff,0)/rounds.length).toFixed(2) : '—';

  return (
    <div>
      <div className="prof-hdr">
        <button className="back-btn" onClick={onBack}>‹  Back</button>
        <div className="prof-name">{name}</div>
        <div className="prof-sub">Grade {g} &nbsp;·&nbsp; {rounds.length} rounds played</div>
        <div className="stats-row">
          <div className="stat-box">
            <div className="stat-val">{hc !== null ? hc.toFixed(2) : '—'}</div>
            <div className="stat-lbl">Current HCI</div>
          </div>
          <div className="stat-box">
            <div className="stat-val">{g}</div>
            <div className="stat-lbl">Grade</div>
          </div>
          <div className="stat-box">
            <div className="stat-val">{best}</div>
            <div className="stat-lbl">Best Diff</div>
          </div>
          <div className="stat-box">
            <div className="stat-val">{avg}</div>
            <div className="stat-lbl">Avg Diff</div>
          </div>
        </div>
      </div>

      <div className="action-bar">
        <button className="btn-primary btn-gold" onClick={onAddScore}>
          + &nbsp;Add New Round
        </button>
      </div>

      <div className="rule-box">
        <p><strong>HCI Rule:</strong> Rounds 1–3: avg all · Rounds 4–7: avg last 3 · Rounds 8–9: best 3 of last 8 · Round 10+: best 3 of last 10 · Max 36</p>
      </div>

      <div className="sec-hdr">
        <span className="sec-title">Score History</span>
        <span className="sec-count">{rounds.length} rounds</span>
      </div>

      {rounds.length === 0
        ? <div className="empty"><div className="empty-icon">⛳</div><div className="empty-txt">No scores recorded yet.<br/>Add the first round above.</div></div>
        : <div className="tbl-wrap">
            <table className="score-tbl">
              <thead>
                <tr>
                  <th>#</th><th>Date</th><th>Score</th><th>CR</th><th>SR</th>
                  <th>Diff</th><th>HCI</th><th>Course</th>
                </tr>
              </thead>
              <tbody>
                {[...roundsWithHC].reverse().map((r, ri) => {
                  const num = roundsWithHC.length - ri;
                  return (
                    <tr key={ri}>
                      <td style={{color:'var(--t-lite)'}}>{num}</td>
                      <td>{fmtDate(r.date)}</td>
                      <td style={{fontWeight:700}}>{r.grossScore}</td>
                      <td>{r.courseRating}</td>
                      <td>{r.slopeRating}</td>
                      <td className="td-diff">{r.scoreDiff.toFixed(2)}</td>
                      <td className="td-hci">{r.hci !== null ? r.hci.toFixed(2) : '—'}</td>
                      <td className="td-course">{r.course || '—'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
      }
    </div>
  );
}

/* ─────────────────── ADD SCORE FORM ───────────────────────────── */
function AddScore({ preId, preName, onBack, onSaved }) {
  const [members, setMembers] = useState([]);
  const [selId, setSelId]     = useState(preId || '');
  const [gross, setGross]     = useState('');
  const [cr, setCr]           = useState('');
  const [sr, setSr]           = useState('');
  const [course, setCourse]   = useState('');
  const [date, setDate]       = useState(today());
  const [saving, setSaving]   = useState(false);

  useEffect(() => {
    db.collection('members').get().then(snap => {
      const list = snap.docs.map(d => ({ id: d.id, name: d.data().name }));
      list.sort((a,b) => a.name.localeCompare(b.name));
      setMembers(list);
    });
  }, []);

  const diff = gross && cr && sr
    ? scoreDiff(parseFloat(gross), parseFloat(cr), parseFloat(sr))
    : null;

  async function save() {
    if (!selId || !gross || !cr || !sr) return;
    setSaving(true);
    const sd = scoreDiff(parseFloat(gross), parseFloat(cr), parseFloat(sr));
    const round = {
      grossScore: parseFloat(gross), courseRating: parseFloat(cr),
      slopeRating: parseFloat(sr), scoreDiff: sd,
      course: course.trim() || 'Unknown Course',
      date, addedAt: new Date().toISOString()
    };
    await db.collection('members').doc(selId).update({
      rounds: firebase.firestore.FieldValue.arrayUnion(round)
    });
    setSaving(false);
    onSaved();
  }

  const valid = selId && gross && cr && sr;

  return (
    <div className="form-wrap">
      {onBack &&
        <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--g-btn)',fontSize:14,padding:'0 0 10px',display:'flex',alignItems:'center',gap:4,fontFamily:'Nunito,sans-serif'}} onClick={onBack}>
          ‹  Back
        </button>
      }

      <div className="form-card">
        <div className="form-title">Record a Round</div>

        <div className="form-grp">
          <label className="form-lbl">Member</label>
          <select className="form-inp" value={selId} onChange={e=>setSelId(e.target.value)}>
            <option value="">Select member…</option>
            {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
          </select>
        </div>

        <div className="form-grp">
          <label className="form-lbl">Date Played</label>
          <input type="date" className="form-inp" value={date} onChange={e=>setDate(e.target.value)}/>
        </div>

        <div className="form-grp">
          <label className="form-lbl">Gross Score</label>
          <input type="number" inputMode="numeric" className="form-inp" placeholder="e.g. 95"
            value={gross} onChange={e=>setGross(e.target.value)}/>
        </div>

        <div className="form-row">
          <div className="form-grp">
            <label className="form-lbl">Course Rating (CR)</label>
            <input type="number" inputMode="decimal" step="0.1" className="form-inp" placeholder="e.g. 70.4"
              value={cr} onChange={e=>setCr(e.target.value)}/>
          </div>
          <div className="form-grp">
            <label className="form-lbl">Slope Rating (SR)</label>
            <input type="number" inputMode="numeric" className="form-inp" placeholder="e.g. 125"
              value={sr} onChange={e=>setSr(e.target.value)}/>
          </div>
        </div>

        <div className="form-grp">
          <label className="form-lbl">Course Name</label>
          <input type="text" className="form-inp" placeholder="e.g. Meadowbrook GC"
            value={course} onChange={e=>setCourse(e.target.value)}/>
        </div>

        {diff !== null &&
          <div className="calc-box">
            <div className="calc-lbl">Calculated Score Differential</div>
            <div className="calc-val">{diff.toFixed(4)}</div>
            <div className="calc-formula">= (({gross} − {cr}) × 113) ÷ {sr}</div>
          </div>
        }

        <button className="btn-primary" onClick={save} disabled={!valid || saving}>
          {saving ? 'Saving…' : 'Save Round'}
        </button>
      </div>
    </div>
  );
}

/* ─────────────────── MEMBERS TAB ──────────────────────────────── */
function Members({ onPlayer }) {
  const [all, setAll]       = useState([]);
  const [busy, setBusy]     = useState(true);
  const [search, setSearch] = useState('');
  const [newName, setNewName] = useState('');
  const [adding, setAdding]   = useState(false);

  useEffect(() => {
    const unsub = db.collection('members').onSnapshot(snap => {
      const list = snap.docs.map(d => ({ id: d.id, name: d.data().name, rounds: (d.data().rounds||[]).length }));
      list.sort((a,b) => a.name.localeCompare(b.name));
      setAll(list);
      setBusy(false);
    });
    return unsub;
  }, []);

  async function addMember() {
    const n = newName.trim();
    if (!n) return;
    setAdding(true);
    const id = mid(n);
    await db.collection('members').doc(id).set({ name: n, rounds: [], createdAt: new Date().toISOString() });
    setNewName('');
    setAdding(false);
  }

  const filtered = all.filter(m => m.name.toLowerCase().includes(search.toLowerCase()));

  if (busy) return <div className="loading"><div className="loading-spin"/><div className="loading-txt">Loading…</div></div>;

  return (
    <div>
      <div className="filter-bar">
        <input className="search-inp" placeholder="🔍  Search member…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      <div className="admin-card">
        <div className="admin-card-title">Add New Member</div>
        <div className="admin-row">
          <input className="form-inp" style={{flex:1}} placeholder="Full name" value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e => e.key==='Enter' && addMember()}/>
          <button className="btn-primary" style={{width:'auto',padding:'11px 18px',marginTop:0}} onClick={addMember} disabled={!newName.trim()||adding}>
            {adding ? '…' : 'Add'}
          </button>
        </div>
      </div>

      <div className="sec-hdr">
        <span className="sec-title">All Members</span>
        <span className="sec-count">{filtered.length}</span>
      </div>

      {filtered.map(m => (
        <div key={m.id} className="p-row" onClick={() => onPlayer(m.id, m.name)}>
          <div className="p-info">
            <div className="p-name">{m.name}</div>
            <div className="p-meta">{m.rounds} round{m.rounds!==1?'s':''} recorded</div>
          </div>
          <span className="p-caret">›</span>
        </div>
      ))}
    </div>
  );
}

/* ─────────────────── ROOT APP ─────────────────────────────────── */
function App() {
  const [ready, setReady]       = useState(false);
  const [tab, setTab]           = useState('dashboard');
  const [view, setView]         = useState('dashboard'); // dashboard | profile | addScore | members
  const [player, setPlayer]     = useState(null);       // { id, name }
  const [toast, setToast]       = useState('');

  useEffect(() => {
    seedIfEmpty().then(() => setReady(true)).catch(() => setReady(true));
  }, []);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(''), 2800);
  }

  function goPlayer(id, name) {
    setPlayer({ id, name });
    setView('profile');
  }

  function goAddScore(fromProfile) {
    setView('addScore');
  }

  function onScoreSaved() {
    showToast('✓  Round saved successfully!');
    setView(player ? 'profile' : 'dashboard');
  }

  function changeTab(t) {
    setTab(t);
    if (t === 'dashboard') { setView('dashboard'); setPlayer(null); }
    else if (t === 'addScore') { setView('addScore'); }
    else if (t === 'members') { setView('members'); }
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });

  if (!ready) return (
    <div id="app">
      <div className="splash">
        <div className="splash-logo">⛳</div>
        <div className="splash-name">IGCQ Golf</div>
        <div className="splash-sub">Handicap Management System</div>
        <div className="splash-dots">
          <div className="splash-dot"/><div className="splash-dot"/><div className="splash-dot"/>
        </div>
      </div>
    </div>
  );

  return (
    <div id="app">
      <div className="hdr">
        <div className="hdr-left">
          <div className="hdr-logo">⛳</div>
          <div>
            <div className="hdr-title">IGCQ Golf</div>
            <div className="hdr-sub">Handicap Management System</div>
          </div>
        </div>
        <div className="hdr-date">{dateStr}<br/>WHS System</div>
      </div>

      <div className="scroll">
        {view === 'dashboard' && <Dashboard onPlayer={goPlayer}/>}
        {view === 'profile' && player &&
          <Profile pid={player.id} pname={player.name} onBack={() => { setView('dashboard'); setTab('dashboard'); }} onAddScore={() => goAddScore(true)}/>
        }
        {view === 'addScore' &&
          <AddScore preId={player?.id} preName={player?.name}
            onBack={() => setView(player ? 'profile' : 'dashboard')}
            onSaved={onScoreSaved}/>
        }
        {view === 'members' && <Members onPlayer={goPlayer}/>}
      </div>

      <div className="bnav">
        <button className={`bnav-item ${tab==='dashboard'?'active':''}`} onClick={() => changeTab('dashboard')}>
          <span className="bnav-icon">🏆</span>Leaderboard
        </button>
        <button className={`bnav-item ${tab==='addScore'?'active':''}`} onClick={() => changeTab('addScore')}>
          <span className="bnav-icon">＋</span>Add Round
        </button>
        <button className={`bnav-item ${tab==='members'?'active':''}`} onClick={() => changeTab('members')}>
          <span className="bnav-icon">👥</span>Members
        </button>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
