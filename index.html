<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IGCQ Golf Handicap Tracker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase modules (will be initialized after setup)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Your Firebase configuration (replace with your own)
        const firebaseConfig = {
            apiKey: "AIzaSyDiuq0dT3Zdh4eyUR-mVejHhIJ3wsI-Y0M",
  authDomain: "igcq-handicap-app.firebaseapp.com",
  projectId: "igcq-handicap-app",
  storageBucket: "igcq-handicap-app.firebasestorage.app",
  messagingSenderId: "851898772574",
  appId: "1:851898772574:web:5b88567567470cd633d8cf",
  measurementId: "G-MN50TNCS8B"
};

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Make them global for other scripts
        window.db = db;
        window.auth = auth;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.getDocs = getDocs;
        window.updateDoc = updateDoc;
        window.doc = doc;
        window.collection = collection;
        window.query = query;
        window.where = where;
    </script>
    <style>
        /* Custom scrollbar for tables */
        .overflow-x-auto::-webkit-scrollbar { height: 6px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="app" class="min-h-screen">
        <!-- Auth UI (shown when not logged in) -->
        <div id="authContainer" class="min-h-screen flex items-center justify-center bg-gray-100">
            <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
                <div class="flex mb-6 border-b">
                    <button id="loginTab" class="w-1/2 py-2 text-center font-semibold text-blue-600 border-b-2 border-blue-600">Login</button>
                    <button id="registerTab" class="w-1/2 py-2 text-center text-gray-500">Register</button>
                </div>
                <!-- Login Form -->
                <div id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email" class="w-full p-2 border rounded mb-3" required>
                    <input type="password" id="loginPassword" placeholder="Password" class="w-full p-2 border rounded mb-4" required>
                    <button id="loginBtn" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Login</button>
                </div>
                <!-- Register Form (hidden initially) -->
                <div id="registerForm" class="hidden">
                    <input type="text" id="regName" placeholder="Full Name" class="w-full p-2 border rounded mb-3" required>
                    <input type="email" id="regEmail" placeholder="Email" class="w-full p-2 border rounded mb-3" required>
                    <input type="password" id="regPassword" placeholder="Password" class="w-full p-2 border rounded mb-4" required>
                    <button id="registerBtn" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Register</button>
                </div>
                <div id="authMessage" class="mt-4 text-center text-sm text-red-600"></div>
            </div>
        </div>

        <!-- Main App UI (shown after login) -->
        <div id="mainApp" class="hidden">
            <div class="container mx-auto p-4 max-w-6xl">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-3">
                    <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">⛳ IGCQ Handicap Tracker</h1>
                    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Logout</button>
                </div>

                <!-- Add Round Form -->
                <div class="bg-white rounded-lg shadow p-5 mb-6">
                    <h2 class="text-xl font-semibold mb-3">Add New Round</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                        <input type="text" id="courseName" placeholder="Course Name" class="border p-2 rounded">
                        <input type="number" id="grossScore" placeholder="Gross Score" class="border p-2 rounded" step="1">
                        <input type="number" id="courseRating" placeholder="Course Rating" class="border p-2 rounded" step="0.1">
                        <input type="number" id="slopeRating" placeholder="Slope Rating" class="border p-2 rounded" step="1">
                    </div>
                    <button id="submitRoundBtn" class="mt-4 bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 w-full sm:w-auto">Submit Round</button>
                </div>

                <!-- Current Handicap Card -->
                <div class="bg-green-100 rounded-lg shadow p-4 mb-6 text-center">
                    <h2 class="text-lg font-semibold">Your Handicap Index</h2>
                    <p id="handicapValue" class="text-4xl font-bold text-green-700">36.0</p>
                    <p class="text-sm text-gray-600">Based on average of last 3 rounds (max 36)</p>
                </div>

                <!-- Recent Rounds Table -->
                <div class="bg-white rounded-lg shadow p-5 mb-6">
                    <h2 class="text-xl font-semibold mb-3">Your Recent Rounds</h2>
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-white">
                            <thead class="bg-gray-200">
                                <tr>
                                    <th class="py-2 px-3 text-left">Date</th>
                                    <th class="py-2 px-3 text-left">Course</th>
                                    <th class="py-2 px-3 text-left">Gross</th>
                                    <th class="py-2 px-3 text-left">Differential</th>
                                </tr>
                            </thead>
                            <tbody id="roundsTableBody">
                                <tr><td colspan="4" class="text-center py-4">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Club Handicap Summary -->
                <div class="bg-white rounded-lg shadow p-5">
                    <h2 class="text-xl font-semibold mb-3">Club Handicap Summary</h2>
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-white">
                            <thead class="bg-gray-200">
                                <tr>
                                    <th class="py-2 px-3 text-left">Player</th>
                                    <th class="py-2 px-3 text-left">Rounds</th>
                                    <th class="py-2 px-3 text-left">Handicap</th>
                                    <th class="py-2 px-3 text-left">Grade</th>
                                </tr>
                            </thead>
                            <tbody id="summaryTableBody">
                                <tr><td colspan="4" class="text-center py-4">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Wait for Firebase to be ready
        let db, auth, setDoc, getDoc, getDocs, updateDoc, doc, collection, query, where;
        let currentUser = null;

        // Get references after Firebase init
        function initFirebaseRefs() {
            db = window.db;
            auth = window.auth;
            setDoc = window.setDoc;
            getDoc = window.getDoc;
            getDocs = window.getDocs;
            updateDoc = window.updateDoc;
            doc = window.doc;
            collection = window.collection;
            query = window.query;
            where = window.where;
        }

        // Helper: calculate handicap from rounds array
        function calculateHandicap(rounds) {
            if (!rounds || rounds.length === 0) return 36;
            // Use last 3 rounds (most recent first? We'll sort by date descending and take last 3)
            const sorted = [...rounds].sort((a,b) => new Date(b.date) - new Date(a.date));
            const lastThree = sorted.slice(0, 3);
            const avg = lastThree.reduce((sum, r) => sum + r.differential, 0) / lastThree.length;
            return Math.min(avg, 36);
        }

        // Save round to Firestore
        async function addRound(gross, courseRating, slope, courseName) {
            if (!currentUser) return;
            const diff = ((gross - courseRating) * 113) / slope;
            const roundedDiff = Math.round(diff * 10) / 10;
            const newRound = {
                date: new Date().toISOString(),
                grossScore: gross,
                courseRating: parseFloat(courseRating),
                slopeRating: parseInt(slope),
                courseName: courseName,
                differential: roundedDiff
            };
            const userRef = doc(db, "users", currentUser.uid);
            const userSnap = await getDoc(userRef);
            let rounds = [];
            if (userSnap.exists()) {
                rounds = userSnap.data().rounds || [];
            }
            rounds.push(newRound);
            const newHandicap = calculateHandicap(rounds);
            await setDoc(userRef, {
                email: currentUser.email,
                name: currentUser.displayName || currentUser.email.split('@')[0],
                rounds: rounds,
                handicap: newHandicap
            }, { merge: true });
            return { rounds, handicap: newHandicap };
        }

        // Load current user's data
        async function loadUserData() {
            if (!currentUser) return;
            const userRef = doc(db, "users", currentUser.uid);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                const data = userSnap.data();
                const rounds = data.rounds || [];
                const handicap = data.handicap || 36;
                document.getElementById("handicapValue").innerText = handicap.toFixed(1);
                const tbody = document.getElementById("roundsTableBody");
                if (rounds.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4">No rounds yet</td></tr>';
                } else {
                    const reversed = [...rounds].reverse();
                    tbody.innerHTML = reversed.map(r => `
                        <tr class="border-b">
                            <td class="py-2 px-3">${new Date(r.date).toLocaleDateString()}</td>
                            <td class="py-2 px-3">${r.courseName || '-'}</td>
                            <td class="py-2 px-3">${r.grossScore}</td>
                            <td class="py-2 px-3">${r.differential}</td>
                        </tr>
                    `).join('');
                }
            } else {
                // New user
                document.getElementById("handicapValue").innerText = "36.0";
                document.getElementById("roundsTableBody").innerHTML = '<tr><td colspan="4" class="text-center py-4">No rounds yet</td></tr>';
                await setDoc(doc(db, "users", currentUser.uid), {
                    email: currentUser.email,
                    name: currentUser.displayName || currentUser.email.split('@')[0],
                    rounds: [],
                    handicap: 36
                });
            }
        }

        // Load club summary (all users)
        async function loadClubSummary() {
            const querySnapshot = await getDocs(collection(db, "users"));
            const users = [];
            querySnapshot.forEach(docSnap => {
                const data = docSnap.data();
                const roundsCount = data.rounds ? data.rounds.length : 0;
                const handicap = data.handicap !== undefined ? data.handicap : 36;
                let grade = '';
                if (handicap <= 18) grade = 'A';
                else if (handicap <= 30) grade = 'B';
                else grade = 'C';
                users.push({
                    name: data.name || data.email.split('@')[0],
                    rounds: roundsCount,
                    handicap: handicap.toFixed(1),
                    grade: grade
                });
            });
            users.sort((a,b) => a.name.localeCompare(b.name));
            const tbody = document.getElementById("summaryTableBody");
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4">No members yet</td></tr>';
            } else {
                tbody.innerHTML = users.map(u => `
                    <tr class="border-b">
                        <td class="py-2 px-3">${u.name}</td>
                        <td class="py-2 px-3">${u.rounds}</td>
                        <td class="py-2 px-3">${u.handicap}</td>
                        <td class="py-2 px-3">${u.grade}</td>
                    </tr>
                `).join('');
            }
        }

        // Auth state observer
        onAuthStateChanged(auth, async (user) => {
            initFirebaseRefs();
            if (user) {
                currentUser = user;
                document.getElementById("authContainer").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
                await loadUserData();
                await loadClubSummary();
            } else {
                currentUser = null;
                document.getElementById("authContainer").classList.remove("hidden");
                document.getElementById("mainApp").classList.add("hidden");
                // Clear forms
                document.getElementById("loginEmail").value = '';
                document.getElementById("loginPassword").value = '';
                document.getElementById("regName").value = '';
                document.getElementById("regEmail").value = '';
                document.getElementById("regPassword").value = '';
                document.getElementById("authMessage").innerText = '';
            }
        });

        // Tab switching
        document.getElementById("loginTab").addEventListener("click", () => {
            document.getElementById("loginForm").classList.remove("hidden");
            document.getElementById("registerForm").classList.add("hidden");
            document.getElementById("loginTab").classList.add("text-blue-600", "border-blue-600");
            document.getElementById("registerTab").classList.remove("text-blue-600", "border-blue-600");
            document.getElementById("registerTab").classList.add("text-gray-500");
            document.getElementById("loginTab").classList.remove("text-gray-500");
        });
        document.getElementById("registerTab").addEventListener("click", () => {
            document.getElementById("registerForm").classList.remove("hidden");
            document.getElementById("loginForm").classList.add("hidden");
            document.getElementById("registerTab").classList.add("text-blue-600", "border-blue-600");
            document.getElementById("loginTab").classList.remove("text-blue-600", "border-blue-600");
            document.getElementById("loginTab").classList.add("text-gray-500");
            document.getElementById("registerTab").classList.remove("text-gray-500");
        });

        // Login
        document.getElementById("loginBtn").addEventListener("click", async () => {
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                document.getElementById("authMessage").innerText = "";
            } catch (err) {
                document.getElementById("authMessage").innerText = err.message;
            }
        });

        // Register
        document.getElementById("registerBtn").addEventListener("click", async () => {
            const name = document.getElementById("regName").value;
            const email = document.getElementById("regEmail").value;
            const password = document.getElementById("regPassword").value;
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                // Update profile with display name
                // Note: updateProfile requires re-authentication? Actually we can just store name in Firestore.
                // We'll set it when first document is created.
                await setDoc(doc(db, "users", userCred.user.uid), {
                    email: email,
                    name: name,
                    rounds: [],
                    handicap: 36
                });
                document.getElementById("authMessage").innerText = "";
            } catch (err) {
                document.getElementById("authMessage").innerText = err.message;
            }
        });

        // Submit round
        document.getElementById("submitRoundBtn").addEventListener("click", async () => {
            const courseName = document.getElementById("courseName").value.trim();
            const grossScore = parseFloat(document.getElementById("grossScore").value);
            const courseRating = parseFloat(document.getElementById("courseRating").value);
            const slopeRating = parseFloat(document.getElementById("slopeRating").value);
            if (!courseName || isNaN(grossScore) || isNaN(courseRating) || isNaN(slopeRating)) {
                alert("Please fill all fields correctly.");
                return;
            }
            await addRound(grossScore, courseRating, slopeRating, courseName);
            // Clear inputs
            document.getElementById("courseName").value = '';
            document.getElementById("grossScore").value = '';
            document.getElementById("courseRating").value = '';
            document.getElementById("slopeRating").value = '';
            await loadUserData();
            await loadClubSummary();
        });

        // Logout
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            await signOut(auth);
        });
    </script>
</body>
</html>
